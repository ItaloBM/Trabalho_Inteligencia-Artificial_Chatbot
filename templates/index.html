<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopaBot - O Camisa 10 da IA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">⚽ CopaBot 🏆</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-message">Apito inicial! ⏱️ Sou o CopaBot. Pergunte-me sobre os campeões das Copas do Mundo! (Ex: "Quem ganhou em 2002?")</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Faça a sua jogada..." onkeypress="handleKeyPress(event)" autocomplete="off">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
